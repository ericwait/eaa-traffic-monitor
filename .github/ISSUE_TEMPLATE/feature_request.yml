name: Feature Request
description: Suggest an idea or enhancement for this project
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea! See [README.md](../../README.md) for the current project vision to check whether this is already covered.
  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem would this feature solve, or what need does it address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, references, or any other context.
    validations:
      required: false

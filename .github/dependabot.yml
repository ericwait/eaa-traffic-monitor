# Automated update PRs provide the security floor on every dependency track this
# repo has.
#
# Minor/patch updates are grouped into a single PR per ecosystem per run —
# they're low-risk by definition (SemVer), and one PR to review beats ten noisy
# ones. Major updates are deliberately left ungrouped: they can carry breaking
# changes and deserve their own PR, their own CI run, and their own review.
version: 2

updates:
  # Keeps this repo's own CI workflows patched.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      actions-minor-patch:
        update-types:
          - 'minor'
          - 'patch'

  # The app's npm dependency tree (Electron, React, the toolchain).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      npm-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # electron-vite 5 co-resolves with Vite 7, not Vite 8 — revisit post-show.
      - dependency-name: 'vite'
        update-types: ['version-update:semver-major']
      # Companion package for Vite 8 (Oxc-based transform); blocked with vite above — revisit post-show.
      - dependency-name: '@vitejs/plugin-react'
        update-types: ['version-update:semver-major']
      # TypeScript 7.x is the Go-port rewrite; this project deliberately pins classic TS — revisit post-show.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      # @types/node should track the Node version actually in use (CI: 22), not the latest major — revisit post-show.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
